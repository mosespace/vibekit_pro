name: Create VibeKit CLI Release

on:
  push:
    tags:
      - "create-vibekit-app-v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: create-vibekit-app ${{ github.ref_name }}
          generate_release_notes: true